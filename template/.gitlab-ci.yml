# Per-app repo pipeline (one repo = one app; envs are fixed: dev/sim/uat/exp).
#
# Model: GitLab Environments. One plan + apply job per environment. `plan` runs
# on MRs and the default branch; `apply` runs on the default branch and deploys
# into the matching GitLab environment. uat + exp are PROTECTED environments
# (configured by the factory) so their apply pauses for approval; dev + sim
# deploy automatically.
#
# Environment selection (two ways, combined):
#   - AUTO (default, DEPLOY_ENV=auto): each env's jobs run only when its own
#     config/<env>.json changed; a change to SHARED code (*.tf, ci/**,
#     .gitlab-ci.yml) plans every env. This is the normal MR/merge flow.
#   - MANUAL override via the "Run pipeline" dropdown: DEPLOY_ENV=<env> forces
#     just that env regardless of the diff; DEPLOY_ENV=all forces every env.
#
# Teardown: run a pipeline with DESTROY=true and DEPLOY_ENV=<env> to get a
# manual `terraform destroy` job for that env (default branch only). Plan/apply
# are suppressed on a destroy run, and the destroy job never auto-fires.
#
# State: GitLab-managed HTTP backend, one state name per env (= $ENV).
# Auth (production): the shared service principal is inherited from the GROUP
# CI/CD variables (ARM_CLIENT_ID/SECRET, ARM_TENANT_ID). This demo template
# uses a terraform_data placeholder, so no Azure auth is exercised.

workflow:
  # Create a pipeline at all only when something deployable changed (or when an
  # env is forced). Avoids empty, all-jobs-skipped pipelines on docs-only MRs.
  rules:
    # This file ships as a custom project template; the template project itself
    # must never run the pipeline (it has no real subscriptions to deploy to).
    # Set TEMPLATE_REPO=true in the template project's CI/CD variables. Seeding
    # copies repo files only, not project variables, so app repos won't have it.
    - if: '$TEMPLATE_REPO == "true"'
      when: never
    # A destroy run must target an explicit env; never start one on "auto"
    # (which would otherwise create a destroy pipeline with no jobs).
    - if: '$DESTROY == "true" && ($DEPLOY_ENV == "auto" || $DEPLOY_ENV == "")'
      when: never
    - if: '$DEPLOY_ENV != "auto" && $DEPLOY_ENV != ""'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: &relevant_changes
        - "config/*.json"
        - "*.tf"
        - "ci/**/*"
        - ".gitlab-ci.yml"
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: *relevant_changes

variables:
  DEPLOY_ENV:
    value: "auto"
    options: ["auto", "all", "dev", "sim", "uat", "exp"]
    description: "auto = run envs whose config changed (all envs on shared changes); all = every env; or pick one env to force it."
  DESTROY:
    value: "false"
    options: ["false", "true"]
    description: "true (with DEPLOY_ENV=<env>) runs `terraform destroy` for that env instead of plan/apply. Manual, default branch only."

stages:
  - plan
  - apply
  - destroy

.terraform:
  image:
    name: hashicorp/terraform:1.14
    entrypoint: [""]
  variables:
    # One state name per env, namespaced within this project.
    TF_HTTP_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${ENV}"
    TF_HTTP_LOCK_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${ENV}/lock"
    TF_HTTP_UNLOCK_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${ENV}/lock"
    TF_HTTP_LOCK_METHOD: "POST"
    TF_HTTP_UNLOCK_METHOD: "DELETE"
    TF_HTTP_USERNAME: "gitlab-ci-token"
    TF_HTTP_PASSWORD: "${CI_JOB_TOKEN}"
    TF_HTTP_RETRY_WAIT_MIN: "5"
  before_script:
    # The terraform image is alpine-based; pull jq to resolve the per-env module
    # version from this repo's own config, then stamp it before init. (No-op on
    # this demo branch: there is no versioned module.tf, so stamp exits early.)
    - apk add --no-cache bash jq
    - export MODULE_VERSION="$(jq -r '.module_version // empty' config/${ENV}.json)"
    - bash ci/stamp-module-version.sh
    - terraform init

.plan:
  extends: .terraform
  stage: plan
  script:
    - terraform plan -input=false -var="env=${ENV}" -out=plan.cache
  artifacts:
    paths: [plan.cache]
    # Must outlive the manual-approval wait on protected envs (uat/exp): if the
    # plan artifact expires before the apply is approved, the reviewed plan is
    # gone and apply can't run. Keep it well beyond a typical approval window.
    expire_in: 1 week
  # Forced override wins; otherwise (auto) run on this env's config change or any
  # shared change. $ENV is set per job and expands in the changes paths.
  rules:
    - if: '$DESTROY == "true"'      # destroy run: skip plan/apply entirely
      when: never
    - if: '$DEPLOY_ENV == "all"'
    - if: '$DEPLOY_ENV == $ENV'
    - if: '$DEPLOY_ENV == "auto" || $DEPLOY_ENV == ""'
      changes: &env_changes
        - "config/${ENV}.json"
        - "*.tf"
        - "ci/**/*"
        - ".gitlab-ci.yml"

.apply:
  extends: .terraform
  stage: apply
  script:
    - terraform apply -input=false plan.cache
  # Apply only on the default branch. Same env selection as plan: forced
  # override wins, else (auto) this env's config change or any shared change.
  # Every env's apply is manual (someone clicks play); rules-based when:manual
  # is blocking (allow_failure:false) so the pipeline waits for it. uat/exp also
  # require the factory's protected-environment approval on top of this click.
  rules:
    - if: '$DESTROY == "true"'      # destroy run: skip plan/apply entirely
      when: never
    - if: '$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      when: never
    - if: '$DEPLOY_ENV == "all"'
      when: manual
    - if: '$DEPLOY_ENV == $ENV'
      when: manual
    - if: '$DEPLOY_ENV == "auto" || $DEPLOY_ENV == ""'
      changes: *env_changes
      when: manual

.destroy:
  extends: .terraform
  stage: destroy
  script:
    - terraform destroy -input=false -auto-approve -var="env=${ENV}"
  # Opt-in only: needs DESTROY=true AND an explicit DEPLOY_ENV. Default branch
  # only, manual (you click play), and allow_failure so an un-clicked destroy
  # never blocks/fails the pipeline. uat/exp stay protected environments, so the
  # action:stop deployment is gated by the same controls as apply.
  rules:
    - if: '$DESTROY != "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      when: never
    - if: '$DEPLOY_ENV == "all"'
      when: manual
      allow_failure: true
    - if: '$DEPLOY_ENV == $ENV'
      when: manual
      allow_failure: true

# ----- dev -------------------------------------------------------------------
plan:dev:
  extends: .plan
  variables: { ENV: "dev" }

apply:dev:
  extends: .apply
  needs: ["plan:dev"]
  variables: { ENV: "dev" }
  environment: { name: "dev" }

destroy:dev:
  extends: .destroy
  variables: { ENV: "dev" }
  environment: { name: "dev", action: stop }

# ----- sim -------------------------------------------------------------------
plan:sim:
  extends: .plan
  variables: { ENV: "sim" }

apply:sim:
  extends: .apply
  needs: ["plan:sim"]
  variables: { ENV: "sim" }
  environment: { name: "sim" }

destroy:sim:
  extends: .destroy
  variables: { ENV: "sim" }
  environment: { name: "sim", action: stop }

# ----- uat (protected: requires approval) ------------------------------------
plan:uat:
  extends: .plan
  variables: { ENV: "uat" }

apply:uat:
  extends: .apply
  needs: ["plan:uat"]
  variables: { ENV: "uat" }
  environment: { name: "uat" }

destroy:uat:
  extends: .destroy
  variables: { ENV: "uat" }
  environment: { name: "uat", action: stop }

# ----- exp (protected: requires approval) ------------------------------------
plan:exp:
  extends: .plan
  variables: { ENV: "exp" }

apply:exp:
  extends: .apply
  needs: ["plan:exp"]
  variables: { ENV: "exp" }
  environment: { name: "exp" }

destroy:exp:
  extends: .destroy
  variables: { ENV: "exp" }
  environment: { name: "exp", action: stop }
